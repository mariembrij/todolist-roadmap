<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>My tasks</title>
</head>

<body>
    <main class="app-card">
        <header class="app-header">
            <h1> my to do list</h1>
            <p class="app-subtitle">stay on top of your day</p>
        </header>
        <form id="todo-form" class="todo-form">
            <input type="text" id="todo-input" class="todo-input" aria-label="New task" placeholder="add a new task">
            <button type="submit" id="add-btn" class="add-btn">Add</button>
        </form>
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="active">Active</button>
            <button class="filter-tab" data-filter="completed">Completed</button>
        </div>
        <ul id="todo-list" class="todo-list"></ul>
        <p id="empty-state" class="empty-state" hidden>
            No tasks yet. Add your first one above!
        </p>
        <footer class="app-footer">
            <span id="items-left">0 items left </span>
            <button id="clear-completed" class="clear-btn">
                Clear completed
            </button>
        </footer>

    </main>
</body>

</html>
